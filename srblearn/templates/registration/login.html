<!-- templates/registration/login.html -->
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Вход</title>
</head>
<body>
    <h2>Вход</h2>
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Войти</button>
    </form>

    <!-- Кнопка возврата на главную -->
    <p>
        <a href="{% url 'index' %}">← На главную</a>
    </p>

    <p>Ещё нет аккаунта? <a href="{% url 'signup' %}">Зарегистрироваться</a></p>
</body>
</html>
